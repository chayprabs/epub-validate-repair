services:
  web:
    image: node:22-bookworm
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install && pnpm --filter @epubdoctor/web dev --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
    depends_on:
      - worker

  worker:
    image: python:3.12-slim
    working_dir: /workspace/apps/worker
    command: sh -lc "pip install -r requirements.txt && uvicorn src.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
