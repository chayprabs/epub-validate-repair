name: ci

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python ../../tests/fixtures/generate_epub_fixtures.py
      - run: pytest -q

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker build -f apps/worker/Dockerfile -t epubdoctor-worker:ci .
      - run: docker build -f apps/web/Dockerfile -t epubdoctor-web:ci .
      - run: |
          worker_size_bytes=$(docker image inspect epubdoctor-worker:ci --format '{{.Size}}')
          echo "worker_size_bytes=${worker_size_bytes}"
          if [ "$worker_size_bytes" -gt 1610612736 ]; then
            echo "Worker image exceeds 1.5 GB budget"
            exit 1
          fi
